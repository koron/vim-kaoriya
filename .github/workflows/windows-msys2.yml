name: Windows with MSYS2

on:
  push:
    branches: [ '**' ]
    tags-ignore: ['**' ]

  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: windows-2025

    defaults:
      run:
        shell: cmd

    steps:
    - name: Set up MSYS2 packages
      uses: msys2/setup-msys2@4f806de0a5a7294ffabaff804b38a9b435a73bda # v2.30.0
      id: msys2
      with:
        update: true
        pacboy: >-
          diffutils:p
          make:p
          gcc:p
          libiconv:p
          gettext:p
          xpm-nox:p
          luajit:p
          patch:
          make:
          iconv:
          man-db:
          pkgconf:
          rsync:
          7zip:p
        msystem: UCRT64
        release: false

    - name: Set up MSYS2 path
      run: |
        echo ${{ steps.msys2.outputs.msys2-location }}\%MSYSTEM%\bin>> %GITHUB_PATH%
        echo ${{ steps.msys2.outputs.msys2-location }}\usr\bin>> %GITHUB_PATH%

    - name: Configure git
      run: git config --global core.autocrlf input

    - name: Checkout repository with submodules
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Read VERSION file
      run: |
        FOR /F "usebackq eol=# tokens=1,2 delims==	 " %%i IN ("VERSION") DO (ECHO %%i=%%j) >> %GITHUB_ENV%

    - name: Apply kaoriya patches
      working-directory: vim
      run: |
        FOR /F "delims=" %%l IN (..\patches\master\series) DO (
          ECHO Applying patch: %%l
          patch -p1 < "..\patches\master\%%l"
          IF ERRORLEVEL 1 EXIT /B 1
        )

    - name: Build
      working-directory: build/msys2
      shell: msys2 {0}
      run: |
        make build

    - name: Distribution
      working-directory: build/msys2
      shell: msys2 {0}
      run: |
        make zip

    - name: Upload the built artifacts
      uses: actions/upload-artifact@v7
      with:
        name: windows-ucrt64-build
        path: |
          build/msys2/target/vim${{ env.VIM_VER_SHORT }}-kaoriya-ucrt64
        if-no-files-found: error
